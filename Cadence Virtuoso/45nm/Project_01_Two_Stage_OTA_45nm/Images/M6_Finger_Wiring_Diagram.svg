<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="480" fill="#ffffff"/>

  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#111111">M6 Second-Stage PMOS — Intended vs As-Built Finger Wiring</text>

  <!-- ===== TOP PANEL: INTENDED PARALLEL ===== -->
  <text x="40" y="65" font-size="15" font-weight="bold" fill="#1a7a3c">Intended: 25 Fingers in Parallel</text>
  <text x="40" y="83" font-size="12" fill="#444444">Effective W = 250 µm (25 × 10 µm), effective L = 180 nm</text>

  <!-- VDD bus -->
  <line x1="70" y1="105" x2="830" y2="105" stroke="#222222" stroke-width="3"/>
  <text x="40" y="109" font-size="13" font-weight="bold" fill="#222222">VDD</text>

  <!-- VOUT bus -->
  <line x1="70" y1="195" x2="830" y2="195" stroke="#222222" stroke-width="3"/>
  <text x="30" y="199" font-size="13" font-weight="bold" fill="#222222">VOUT</text>

  <!-- 5 representative fingers, all in parallel between VDD and VOUT -->
  <g stroke="#1a7a3c" stroke-width="2.5" fill="none">
    <line x1="130" y1="105" x2="130" y2="195"/>
    <line x1="250" y1="105" x2="250" y2="195"/>
    <line x1="370" y1="105" x2="370" y2="195"/>
    <line x1="490" y1="105" x2="490" y2="195"/>
    <line x1="610" y1="105" x2="610" y2="195"/>
  </g>
  <!-- gate marks (small perpendicular ticks at mid-channel, representing gate poly) -->
  <g stroke="#0a4d8a" stroke-width="2.5">
    <line x1="118" y1="150" x2="142" y2="150"/>
    <line x1="238" y1="150" x2="262" y2="150"/>
    <line x1="358" y1="150" x2="382" y2="150"/>
    <line x1="478" y1="150" x2="502" y2="150"/>
    <line x1="598" y1="150" x2="622" y2="150"/>
  </g>
  <!-- gate bus (net25) feeding all gates -->
  <line x1="130" y1="150" x2="610" y2="150" stroke="#0a4d8a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="660" y="154" font-size="12" fill="#0a4d8a">gate bus (net25)</text>

  <text x="690" y="150" font-size="22" fill="#666666">···</text>
  <text x="700" y="120" font-size="12" fill="#666666">(25 fingers total,</text>
  <text x="700" y="135" font-size="12" fill="#666666">5 shown)</text>

  <text x="450" y="225" text-anchor="middle" font-size="12" font-style="italic" fill="#1a7a3c">All 25 sources tied to common VDD bus · All 25 drains tied to common VOUT bus → true parallel comb</text>

  <!-- divider -->
  <line x1="30" y1="255" x2="870" y2="255" stroke="#cccccc" stroke-width="1"/>

  <!-- ===== BOTTOM PANEL: AS-BUILT SERIES CHAIN ===== -->
  <text x="40" y="285" font-size="15" font-weight="bold" fill="#b3261e">As-Built (Bug): 25 Fingers Wired as a Series Chain</text>
  <text x="40" y="303" font-size="12" fill="#444444">Effective channel length ≈ 25 × 180 nm (~4.5 µm) — severe loss of drive strength</text>

  <!-- VDD node -->
  <text x="35" y="365" font-size="13" font-weight="bold" fill="#222222">VDD</text>
  <circle cx="70" cy="360" r="4" fill="#222222"/>

  <!-- series chain: finger boxes with shared diffusion nodes avC10...avC33 -->
  <g stroke="#b3261e" stroke-width="2.5" fill="none">
    <line x1="70" y1="360" x2="160" y2="360"/>
    <line x1="160" y1="360" x2="250" y2="360"/>
    <line x1="250" y1="360" x2="340" y2="360"/>
    <line x1="340" y1="360" x2="430" y2="360"/>
    <line x1="430" y1="360" x2="520" y2="360"/>
  </g>
  <!-- gate ticks for each finger in the chain -->
  <g stroke="#0a4d8a" stroke-width="2.5">
    <line x1="115" y1="340" x2="115" y2="380"/>
    <line x1="205" y1="340" x2="205" y2="380"/>
    <line x1="295" y1="340" x2="295" y2="380"/>
    <line x1="385" y1="340" x2="385" y2="380"/>
    <line x1="475" y1="340" x2="475" y2="380"/>
  </g>
  <!-- shared diffusion nodes -->
  <circle cx="160" cy="360" r="4" fill="#b3261e"/>
  <text x="150" y="395" font-size="10" fill="#666666">avC10</text>
  <circle cx="250" cy="360" r="4" fill="#b3261e"/>
  <text x="240" y="395" font-size="10" fill="#666666">avC11</text>
  <circle cx="340" cy="360" r="4" fill="#b3261e"/>
  <text x="330" y="395" font-size="10" fill="#666666">avC12</text>
  <circle cx="430" cy="360" r="4" fill="#b3261e"/>
  <text x="420" y="395" font-size="10" fill="#666666">...</text>

  <text x="540" y="364" font-size="22" fill="#666666">···</text>

  <line x1="620" y1="360" x2="700" y2="360" stroke="#b3261e" stroke-width="2.5"/>
  <circle cx="700" cy="360" r="4" fill="#222222"/>
  <text x="710" y="365" font-size="13" font-weight="bold" fill="#222222">VOUT</text>
  <text x="640" y="395" font-size="10" fill="#666666">avC33</text>

  <text x="450" y="430" text-anchor="middle" font-size="12" font-style="italic" fill="#b3261e">Every internal node (avC10…avC33) is simultaneously one finger's drain AND the next finger's source —</text>
  <text x="450" y="448" text-anchor="middle" font-size="12" font-style="italic" fill="#b3261e">no clean split into source-type / drain-type nodes. This is a genuine series stack, not a parallel comb.</text>
</svg>
